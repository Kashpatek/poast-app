name: Render Video
on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Remotion renderer + Chrome
        run: |
          npm install @remotion/renderer @remotion/bundler
          npx remotion browser ensure

      - name: Render video
        run: |
          node scripts/render.mjs
        env:
          RENDER_PROPS: ${{ toJson(github.event.client_payload.props) }}
          RENDER_ID: ${{ github.event.client_payload.renderId }}

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: render-${{ github.event.client_payload.renderId }}
          files: output/*.mp4
          body: "Auto-rendered by POAST Press to Premier"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
