        if (et) et.textContent = 'Deck complete';
        if (es) es.textContent = 'Every card in this deck has been reviewed. Switch decks or open results.';
      }
      var rrb = document.getElementById('btnReReviewEmpty'), nd = ovDenyIds().length;
      if (rrb) { if (nd) { rrb.textContent = (reviewingDenied ? 'Re-review remaining denied (' : 'Re-review denied overlays (') + nd + ')'; rrb.classList.remove('hide'); } else rrb.classList.add('hide'); }
      return;
    }
    emptyEl.classList.add('hide'); deckEl.style.display = '';
    if (c + 1 < list.length) {
      var nx = document.createElement('div'); nx.className = 'swipecard next';
      nx.innerHTML = cardInnerHTML(list[c + 1]); deckEl.appendChild(nx);
    }
    var top = document.createElement('div'); top.className = 'swipecard top';
    top.innerHTML = cardInnerHTML(list[c]) + stampsHTML();
    deckEl.appendChild(top);
    attachGestures(top, list[c]);
    updateMeta(list[c]);
  }

  // ---------- gestures ----------
  function attachGestures(card, item) {
    var startX = 0, startY = 0, dx = 0, dy = 0, dragging = false, cw = 0, ch = 0;
    var likeS = card.querySelector('[data-stamp=like]'), denyS = card.querySelector('[data-stamp=deny]'), loveS = card.querySelector('[data-stamp=love]');
    function down(e) {
      if (e.button && e.button !== 0) return;
      dragging = true; card.classList.add('grabbing'); card.classList.remove('snap');
      var r = card.getBoundingClientRect(); cw = r.width; ch = r.height;
      startX = e.clientX; startY = e.clientY; dx = 0; dy = 0;
      try { card.setPointerCapture(e.pointerId); } catch (_) {}
    }
    function move(e) {
      if (!dragging) return;
      dx = e.clientX - startX; dy = e.clientY - startY;
      card.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + (dx * 0.05) + 'deg)';
      var loveAmt = (-dy > Math.abs(dx)) ? Math.min(1, (-dy) / (ch * 0.20)) : 0;
      var likeAmt = (dx > 0 && dx > Math.abs(dy) * 0.55) ? Math.min(1, dx / (cw * 0.26)) : 0;
      var denyAmt = (dx < 0 && -dx > Math.abs(dy) * 0.55) ? Math.min(1, (-dx) / (cw * 0.26)) : 0;
      if (loveAmt > 0.15) { likeAmt = 0; denyAmt = 0; }
      loveS.style.opacity = loveAmt; likeS.style.opacity = likeAmt; denyS.style.opacity = denyAmt;
    }
    function up() {
      if (!dragging) return; dragging = false; card.classList.remove('grabbing');
      var loveThresh = ch * 0.18, horThresh = cw * 0.24;
      if (-dy > loveThresh && -dy > Math.abs(dx)) fly(card, item, 'love');
      else if (dx > horThresh) fly(card, item, 'like');
      else if (-dx > horThresh) fly(card, item, 'deny');
      else snapBack(card);
    }
    card.addEventListener('pointerdown', down);
    card.addEventListener('pointermove', move);
    card.addEventListener('pointerup', up);
    card.addEventListener('pointercancel', function () { if (dragging) { dragging = false; card.classList.remove('grabbing'); snapBack(card); } });
  }
  function snapBack(card) {
    card.classList.add('snap');
    card.style.transform = 'translate(0,0) rotate(0)';
    ['like', 'deny', 'love'].forEach(function (s) { var el = card.querySelector('[data-stamp=' + s + ']'); if (el) el.style.opacity = 0; });
  }

  var animating = false;
  function fly(card, item, verdict) {
    if (animating) return; animating = true;
    card.classList.remove('snap'); card.classList.add('fly');
    var tx = 0, ty = 0, rot = 0;
    if (verdict === 'like') { tx = window.innerWidth * 1.15; rot = 20; }
    else if (verdict === 'deny') { tx = -window.innerWidth * 1.15; rot = -20; }
    else { ty = -window.innerHeight * 1.15; }
    // make sure the matching stamp is fully shown as it flies
    var st = card.querySelector('[data-stamp=' + verdict + ']'); if (st) st.style.opacity = 1;
    requestAnimationFrame(function () {
      card.style.transform = 'translate(' + tx + 'px,' + ty + 'px) rotate(' + rot + 'deg)';
      card.style.opacity = '0';
    });
    doCommit(item, verdict);
    setTimeout(function () { animating = false; advance(); if (verdict === 'deny') openReason(item); }, 320);
  }

  // ---------- commit / advance / undo ----------
  var history = [];
  function doCommit(item, verdict) {
    var prev = store[item.deck][item.id] || null;
    history.push({ deck: item.deck, id: item.id, prev: prev });
    if (history.length > 300) history.shift();
    store[item.deck][item.id] = { verdict: verdict, reason: (prev && prev.reason) || '', name: item.name, cat: item.cat || null, ts: Date.now() };
    saveStore(); updateUndo();
  }
  function advance() { setCursor(cursor() + 1); render(); }

  function undo() {
    if (!history.length) return;
    var h = history.pop();
    if (h.prev) store[h.deck][h.id] = h.prev; else delete store[h.deck][h.id];
    saveStore();
    if (current === h.deck) {
      var list = decks[h.deck].list, pos = -1;
      for (var i = 0; i < list.length; i++) if (list[i].id === h.id) { pos = i; break; }
      if (pos >= 0) decks[h.deck].cursor = pos;
    } else {
      var list2 = decks[h.deck].list, pos2 = -1;
      for (var j = 0; j < list2.length; j++) if (list2[j].id === h.id) { pos2 = j; break; }
      if (pos2 >= 0) decks[h.deck].cursor = pos2;
    }
    updateUndo(); render();
  }
  function updateUndo() { document.getElementById('btnUndo').disabled = history.length === 0; }

  // tap-button commit on the live top card
  function actBtn(verdict) {
    var list = activeList(), c = cursor(); if (c >= list.length) return;
    var top = deckEl.querySelector('.swipecard.top'); if (!top) return;
    fly(top, list[c], verdict);
  }

  // ---------- deny reason sheet ----------
  var reasonTarget = null;
  function openReason(item) {
    reasonTarget = item;
    document.getElementById('reasonItem').textContent = (item.cat ? item.cat + ' · ' : 'Backdrop · ') + item.name;
    var ta = document.getElementById('reasonText');
    var rec = store[item.deck][item.id];
    ta.value = (rec && rec.reason) || '';
    document.getElementById('reasonSheet').classList.remove('hide');
    setTimeout(function () { try { ta.focus(); } catch (e) {} }, 70);
  }
  function closeReason(save) {
    if (save && reasonTarget) {
      var rec = store[reasonTarget.deck][reasonTarget.id];
      if (rec) { rec.reason = document.getElementById('reasonText').value.trim(); saveStore(); }
    }
    document.getElementById('reasonSheet').classList.add('hide');
    reasonTarget = null;
  }

  // ---------- meta ----------
  function clearMeta() { document.getElementById('meta').innerHTML = ''; }
  function updateMeta(item) {
    var list = activeList(), c = cursor();
    var rec = store[item.deck][item.id];
    var v = rec ? rec.verdict : null;
    var vtxt = v ? ' · <span class="m-verdict" style="color:' + verdictColor(v) + '">' + v.toUpperCase() + '</span>' : '';
    var sub = item.deck === 'bg' ? 'Backdrop' : item.cat;
    var pos = '<span class="m-pos">' + (c + 1) + ' / ' + list.length + '</span> · ';
    document.getElementById('meta').innerHTML =
      '<div class="m-name">' + escapeHtml(item.name) + '</div>' +
      '<div class="m-sub">' + pos + escapeHtml(sub) + vtxt + '</div>';
  }

  // ---------- options ----------
  function buildBackdropOptions() {
    var sel = document.getElementById('optBackdrop');
    var html = '<option value="cycle">Cycle through all backdrops</option><option value="random">Random per overlay</option>';
    ALL_BG.forEach(function (d) { html += '<option value="bd:' + escapeHtml(d.key) + '">Pin: ' + escapeHtml(d.name || d.key) + '</option>'; });
    sel.innerHTML = html;
  }
  function buildCatChecks() {
    var wrap = document.getElementById('optCats');
    wrap.innerHTML = CATS.map(function (c) {
      var n = OVERLAYS.filter(function (o) { return o.cat === c; }).length;
      return '<label class="opt-check"><input type="checkbox" data-cat="' + c + '"' + (settings.cats[c] ? ' checked' : '') + '> ' + c + ' <span style="color:#6b7286">' + n + '</span></label>';
    }).join('');
    wrap.querySelectorAll('input[data-cat]').forEach(function (inp) {
      inp.addEventListener('change', function () {
        settings.cats[inp.getAttribute('data-cat')] = inp.checked;
        if (!CATS.some(function (c) { return settings.cats[c]; })) { settings.cats[inp.getAttribute('data-cat')] = true; inp.checked = true; return; }
        reviewingDenied = false; // category change rebuilds the full deck, leaving review mode
        decks.ov.list = buildOvList();
        decks.ov.cursor = firstUnrated('ov', decks.ov.list);
        saveStore();
        if (current === 'ov') render();
      });
    });
  }
  function syncOptionUI() {
    document.querySelectorAll('#optPal button').forEach(function (b) { b.classList.toggle('on', b.dataset.v === settings.pal); });
    document.getElementById('optImg').checked = settings.img;
    document.getElementById('optChart').checked = settings.chart;
    document.getElementById('optSafe').checked = settings.safe;
    var sel = document.getElementById('optBackdrop');
    sel.value = settings.bdMode === 'specific' && settings.bdKey ? 'bd:' + settings.bdKey : settings.bdMode;
  }
  function toggleBdCatVisibility() {
    var on = current === 'ov';
    document.getElementById('bdGrp').style.display = on ? '' : 'none';
    document.getElementById('catGrp').style.display = on ? '' : 'none';
  }

  // ---------- results ----------
  function countsOf(recs) { var c = { love: 0, like: 0, deny: 0 }; Object.keys(recs).forEach(function (k) { var v = recs[k].verdict; if (c[v] != null) c[v]++; }); return c; }
  function listFor(verdict) {
    var rows = [];
    ['bg', 'ov'].forEach(function (dk) {
      var recs = store[dk];
      Object.keys(recs).forEach(function (id) {
        var r = recs[id]; if (r.verdict !== verdict) return;
        rows.push({ deck: dk, id: id, name: r.name || id, tag: dk === 'bg' ? id : (r.cat || 'Overlay'), reason: r.reason || '' });
      });
    });
    rows.sort(function (a, b) { return (a.tag + a.name).localeCompare(b.tag + b.name); });
    return rows;
  }
  function buildResults() {
    var cb = countsOf(store.bg), co = countsOf(store.ov);
    var tot = { love: cb.love + co.love, like: cb.like + co.like, deny: cb.deny + co.deny };
    var H = '';
    H += '<div class="tally">' +
      '<div class="t love"><div class="n">' + tot.love + '</div><div class="l">Love</div></div>' +
      '<div class="t like"><div class="n">' + tot.like + '</div><div class="l">Like</div></div>' +
      '<div class="t deny"><div class="n">' + tot.deny + '</div><div class="l">Deny</div></div>' +
      '</div>';
    H += '<div style="font-size:11.5px;color:#8991a3;text-align:center;margin-bottom:4px">Backgrounds ' +
      cb.love + '/' + cb.like + '/' + cb.deny + ' &nbsp;·&nbsp; Overlays ' + co.love + '/' + co.like + '/' + co.deny + ' &nbsp;(love/like/deny)</div>';
    H += '<div class="res-actions">' +
      (co.deny ? '<button class="rereview" id="reReview">Re-review denied overlays (' + co.deny + ')</button>' : '') +
      '<button class="primary" id="copyJson">Copy results JSON</button>' +
      '<button id="copyTxt">Copy readable text</button>' +
      '<button class="danger" id="clearAll">Clear all</button>' +
      '</div>';
    [['love', 'Love'], ['like', 'Like'], ['deny', 'Deny']].forEach(function (pair) {
      var v = pair[0], label = pair[1], rows = listFor(v);
      H += '<div class="res-section"><h3><span class="dot" style="background:' + verdictColor(v) + '"></span>' + label + ' <span style="color:#6b7286;font-weight:700">' + rows.length + '</span></h3>';
      if (!rows.length) H += '<div class="res-empty">Nothing yet.</div>';
      else {
        H += '<div class="res-list">';
        rows.forEach(function (r) {
          H += '<div class="res-item"><div class="ri-v" style="color:' + verdictColor(v) + '">' + verdictGlyph(v) + '</div>' +
            '<div class="ri-main"><div class="ri-name"><span class="ri-tag">' + escapeHtml(r.tag) + '</span>' + escapeHtml(r.name) + '</div>' +
            (r.reason ? '<div class="ri-reason">&ldquo;' + escapeHtml(r.reason) + '&rdquo;</div>' : '') +
            '</div></div>';
        });
        H += '</div>';
      }
      H += '</div>';
    });
    document.getElementById('resBody').innerHTML = H;
    document.getElementById('copyJson').addEventListener('click', function () { copyText(resultsJson()); });
    document.getElementById('copyTxt').addEventListener('click', function () { copyText(resultsText()); });
    document.getElementById('clearAll').addEventListener('click', clearAll);
    var rr = document.getElementById('reReview'); if (rr) rr.addEventListener('click', reReviewDenied);
  }
  function resultsJson() { return JSON.stringify({ bg: store.bg, ov: store.ov, settings: settings, meta: store.meta }, null, 2); }
  function resultsText() {
    var out = ['SemiAnalysis Carousel Swipe Review', 'Updated: ' + (store.meta.updatedAt || ''), 'Palette: ' + STATE.pal, ''];
    [['bg', 'BACKGROUNDS'], ['ov', 'OVERLAYS']].forEach(function (pair) {
      var dk = pair[0], head = pair[1], recs = store[dk], c = countsOf(recs);
      out.push(head + '  (love ' + c.love + ' / like ' + c.like + ' / deny ' + c.deny + ')');
      [['love', 'LOVE'], ['like', 'LIKE'], ['deny', 'DENY']].forEach(function (vp) {
        var v = vp[0];
        var ids = Object.keys(recs).filter(function (id) { return recs[id].verdict === v; });
        if (!ids.length) return;
        out.push('  ' + vp[1]);
        ids.forEach(function (id) {
          var r = recs[id];
          var tag = dk === 'bg' ? id : (r.cat || '');
          out.push('    - ' + tag + ' · ' + (r.name || id) + (r.reason ? '   (reason: ' + r.reason + ')' : ''));
        });
      });
      out.push('');
    });
    return out.join('\n');
  }

  // ---------- clipboard ----------
  var toastT = null;
  function toast(msg) {
    var el = document.getElementById('copyToast'); el.textContent = msg; el.classList.add('show');
    if (toastT) clearTimeout(toastT); toastT = setTimeout(function () { el.classList.remove('show'); }, 1600);
  }
  function copyText(txt) {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(txt).then(function () { toast('Copied'); }, function () { fallbackCopy(txt); });
    } else fallbackCopy(txt);
  }
  function fallbackCopy(txt) {
    var ta = document.createElement('textarea'); ta.className = 'fallback-ta'; ta.value = txt;
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { ta.setSelectionRange(0, txt.length); } catch (e) {}
    var ok = false; try { ok = document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    toast(ok ? 'Copied' : 'Copy failed');
  }

  function clearAll() {
    if (!window.confirm('Clear ALL ratings and reasons? This cannot be undone.')) return;
    store = { bg: {}, ov: {}, meta: {}, settings: settings };
    history = []; updateUndo();
    saveStore();
    reviewingDenied = false;
    decks.bg.list = buildBgList(); decks.ov.list = buildOvList();
    decks.bg.cursor = 0; decks.ov.cursor = 0;
    buildResults(); render();
  }

  function ovDenyIds() { return Object.keys(store.ov).filter(function (id) { return store.ov[id].verdict === 'deny'; }); }

  // Enter a filtered review queue containing ONLY the currently-denied overlays, in index
  // order. The full deck (all Love/Like/Deny) is untouched: each swipe here just overwrites
  // that overlay's verdict, and the queue ends after the last denied card. Verdicts are NOT
  // wiped up front, so exiting early leaves any un-re-swiped ones still marked denied.
  // Overlay indices are unchanged, so this lines up 1:1 with the localStorage verdict keys.
  function reReviewDenied() {
    var ids = ovDenyIds();
    if (!ids.length) { toast('No denied overlays'); return; }
    enterReviewQueue(ids, 'denied overlay'); // exactly the denied ones — not the whole deck
  }

  // ---------- sizing ----------
  function sizeCards() {
    var wrap = document.getElementById('stageWrap');
    var cs = window.getComputedStyle(wrap);
    var padX = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);
    var padY = (parseFloat(cs.paddingTop) || 0) + (parseFloat(cs.paddingBottom) || 0);
    var availW = wrap.clientWidth - padX;   // clientWidth includes padding; subtract it for the true content box
    var availH = wrap.clientHeight - padY;
    if (availW <= 0 || availH <= 0) return;
    var cw = Math.min(availW, availH / 1.25) - 2; // -2 keeps the frame (and its corner mark) clear of the viewport edge
    cw = Math.max(170, Math.floor(cw));
    document.documentElement.style.setProperty('--cardw', cw + 'px');
  }

  // ---------- wiring ----------
  function wireEvents() {
    document.getElementById('btnUndo').addEventListener('click', undo);
    document.querySelectorAll('#seg button').forEach(function (b) {
      b.addEventListener('click', function () {
        if (reviewingDenied) { // leaving the filtered queue restores the full overlay deck
          reviewingDenied = false;
          decks.ov.list = buildOvList();
          decks.ov.cursor = firstUnrated('ov', decks.ov.list);
        }
        current = b.dataset.deck;
        document.querySelectorAll('#seg button').forEach(function (x) { x.classList.toggle('on', x === b); });
        toggleBdCatVisibility(); render();
      });
    });
    document.getElementById('reviewExit').addEventListener('click', exitReview);
    document.querySelectorAll('#actions .act').forEach(function (b) {
      b.addEventListener('click', function () { actBtn(b.dataset.act); });
    });
    // options
    document.getElementById('btnOptions').addEventListener('click', function () { syncOptionUI(); document.getElementById('optionsSheet').classList.remove('hide'); });
    document.getElementById('optClose').addEventListener('click', function () { document.getElementById('optionsSheet').classList.add('hide'); });
    document.getElementById('optionsSheet').addEventListener('click', function (e) { if (e.target.id === 'optionsSheet') e.target.classList.add('hide'); });
    document.querySelectorAll('#optPal button').forEach(function (b) {
      b.addEventListener('click', function () {
        settings.pal = b.dataset.v; STATE.pal = b.dataset.v;
        document.querySelectorAll('#optPal button').forEach(function (x) { x.classList.toggle('on', x === b); });
        saveStore(); render();
      });
    });
    document.getElementById('optImg').addEventListener('change', function (e) { settings.img = e.target.checked; STATE.sampleImage = e.target.checked; saveStore(); render(); });
    document.getElementById('optChart').addEventListener('change', function (e) { settings.chart = e.target.checked; STATE.sampleChart = e.target.checked; saveStore(); render(); });
    document.getElementById('optSafe').addEventListener('change', function (e) { settings.safe = e.target.checked; STATE.safe = e.target.checked; saveStore(); render(); });
    document.getElementById('optBackdrop').addEventListener('change', function (e) {
      var v = e.target.value;
      if (v === 'cycle' || v === 'random') { settings.bdMode = v; settings.bdKey = null; }
      else if (v.indexOf('bd:') === 0) { settings.bdMode = 'specific'; settings.bdKey = v.slice(3); }
      saveStore(); if (current === 'ov') render();
    });
    // reason sheet
    document.getElementById('reasonSave').addEventListener('click', function () { closeReason(true); });
    document.getElementById('reasonSkip').addEventListener('click', function () { closeReason(false); });
    // results
    document.getElementById('btnResults').addEventListener('click', function () { buildResults(); document.getElementById('resultsScreen').classList.remove('hide'); });
    document.getElementById('btnViewResults').addEventListener('click', function () { buildResults(); document.getElementById('resultsScreen').classList.remove('hide'); });
    document.getElementById('btnReReviewEmpty').addEventListener('click', reReviewDenied);
    document.getElementById('resBack').addEventListener('click', function () { document.getElementById('resultsScreen').classList.add('hide'); render(); });
    // resize
    window.addEventListener('resize', sizeCards);
    window.addEventListener('orientationchange', function () { setTimeout(sizeCards, 140); });
    if (window.visualViewport) window.visualViewport.addEventListener('resize', sizeCards);
  }

  // ---------- init ----------
  function init() {
    buildBackdropOptions(); buildCatChecks(); syncOptionUI(); wireEvents();
    current = 'ov';
    document.querySelectorAll('#seg button').forEach(function (x) { x.classList.toggle('on', x.dataset.deck === 'ov'); });
    toggleBdCatVisibility();
    sizeCards();
    // ?denied (or #denied) opens straight into a queue of just the swipe-denied overlays,
    // independent of any stored verdicts.
    var wantDenied = /(^|[?&#])denied(=|&|$)/i.test((location.search || '') + (location.hash || ''));
    var di = wantDenied ? bakedDeniedIndices() : [];
    if (wantDenied && di.length) enterReviewQueue(di, 'denied overlay');
    else render();
    requestAnimationFrame(function () { sizeCards(); });
    updateUndo();
  }
  init();
})();

</script>
</body></html>
