  <text id="field:eyebrow" data-field="eyebrow" data-role="eyebrow" data-maxlen="32" x="86.39" y="114.91" text-anchor="start" style="font-family:'Outfit','Inter',sans-serif;font-size:35.69px;font-weight:850;text-transform:uppercase;letter-spacing:1.5px;fill:rgb(247, 176, 65)" data-w="907" data-minfont="25"><tspan x="86.39" y="114.91">Steelman</tspan></text>
  <text id="field:headline" data-field="headline" data-role="headline" data-maxlen="70" data-minfont="34" data-maxfont="96" x="86.39" y="201.35" text-anchor="start" style="font-family:'Grift','Outfit',sans-serif;font-size:58.41px;font-weight:790;fill:rgb(255, 255, 255)" data-w="835"><tspan x="86.39" y="201.35">The strongest case against our </tspan><tspan x="86.39" y="260.33">HBM4 timeline</tspan></text>
  <text id="field:body-1" data-field="body-1" data-role="body" data-maxlen="48" x="210.3" y="431.27" text-anchor="start" style="font-family:'Outfit','Inter',sans-serif;font-size:34.61px;font-weight:850;opacity:0.82;fill:rgb(224, 99, 71)" data-w="283" data-minfont="21" data-maxlines="2"><tspan x="210.3" y="431.27">THE PUSHBACK</tspan></text>
  <text id="field:body-2" data-field="body-2" data-role="body" data-maxlen="208" x="146.37" y="561.9" text-anchor="start" style="font-family:'Outfit','Inter',sans-serif;font-size:34.61px;font-weight:560;opacity:0.82;fill:rgb(200, 206, 219)" data-w="786" data-minfont="21" data-maxlines="4"><tspan x="146.37" y="561.9">Wafer starts are the real constraint. Once TSMC </tspan><tspan x="146.37" y="606.2">lifts N3E capacity in 2026, HBM4 supply follows </tspan><tspan x="146.37" y="650.5">and the accelerator ramp clears.</tspan></text>
  <text id="field:body-3" data-field="body-3" data-role="body" data-maxlen="42" x="210.3" y="865.19" text-anchor="start" style="font-family:'Outfit','Inter',sans-serif;font-size:34.61px;font-weight:850;fill:rgb(247, 176, 65)" data-w="250" data-minfont="21" data-maxlines="2"><tspan x="210.3" y="865.19">OUR ANSWER</tspan></text>
  <text id="field:body-4" data-field="body-4" data-role="body" data-maxlen="248" x="146.37" y="995.83" text-anchor="start" style="font-family:'Outfit','Inter',sans-serif;font-size:34.61px;font-weight:720;fill:rgb(255, 255, 255)" data-w="811" data-minfont="21" data-maxlines="5"><tspan x="146.37" y="995.83">Wafers are not the binding limit. CoWoS-L </tspan><tspan x="146.37" y="1040.13">interposer area and 12-Hi HBM4 stack yield gate </tspan><tspan x="146.37" y="1084.43">the ramp, and both lag wafer capacity by two to </tspan><tspan x="146.37" y="1128.73">three quarters.</tspan></text>
