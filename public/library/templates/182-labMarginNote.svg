  <text id="field:eyebrow" data-field="eyebrow" data-role="eyebrow" data-maxlen="32" x="86.39" y="120.31" text-anchor="start" style="font-family:'Outfit','Inter',sans-serif;font-size:35.69px;font-weight:850;text-transform:uppercase;letter-spacing:1.5px;fill:rgb(247, 176, 65)" data-w="907" data-minfont="25"><tspan x="86.39" y="120.31">Analyst note</tspan></text>
  <text id="field:headline" data-field="headline" data-role="headline" data-maxlen="57" data-minfont="34" data-maxfont="96" x="86.39" y="221.67" text-anchor="start" style="font-family:'Grift','Outfit',sans-serif;font-size:71.39px;font-weight:790;fill:rgb(255, 255, 255)" data-w="835"><tspan x="86.39" y="221.67">CoWoS, not wafer supply, </tspan><tspan x="86.39" y="293.76">sets the 2026 ceiling</tspan></text>
  <text x="117.34" y="759.65" text-anchor="middle" transform="rotate(-90 117.34 759.65)" style="font-family:'Outfit','Inter',sans-serif;font-size:26px;font-weight:850;text-transform:uppercase;letter-spacing:6px;fill:rgb(137, 146, 165)" opacity="0.9"><tspan x="117.34" y="759.65">ANALYST NOTE</tspan></text>
  <text id="field:body-2" data-field="body-2" data-role="body" data-maxlen="534" x="240.49" y="407.24" text-anchor="start" style="font-family:'Outfit','Inter',sans-serif;font-size:40.56px;font-weight:450;fill:rgb(232, 236, 243)" data-w="702" data-minfont="25" data-maxlines="10"><tspan x="240.49" y="407.24">Read the packaging line, not the </tspan><tspan x="240.49" y="468.08" text-anchor="start" xml:space="preserve">wafer line. TSMC can add </tspan><tspan x="706.83" y="468.08" text-anchor="start" xml:space="preserve" fill="rgb(255, 255, 255)" style="text-decoration:underline;text-decoration-color:rgb(247, 176, 65)">N2 wafer </tspan><tspan x="240.49" y="528.92" text-anchor="start" xml:space="preserve" fill="rgb(255, 255, 255)" style="text-decoration:underline;text-decoration-color:rgb(247, 176, 65)">starts</tspan><tspan x="345.22" y="528.92" text-anchor="start" xml:space="preserve"> faster than it can double </tspan><tspan x="247.79" y="589.76" text-anchor="start" xml:space="preserve" fill="rgb(232, 236, 243)">CoWoS-L</tspan><tspan x="435.17" y="589.76" text-anchor="start" xml:space="preserve"> throughput, so the binding </tspan><tspan x="240.49" y="650.6">constraint through 2026 is advanced-</tspan><tspan x="240.49" y="711.44">packaging capacity and HBM4 stack </tspan><tspan x="240.49" y="772.28">supply, not front-end silicon. Rack-</tspan><tspan x="240.49" y="833.12">level GPU shipments track the </tspan><tspan x="240.49" y="893.96" text-anchor="start" xml:space="preserve">packaging ramp at roughly </tspan><tspan x="734.3" y="893.96" text-anchor="start" xml:space="preserve" fill="rgb(255, 255, 255)" style="text-decoration:underline;text-decoration-color:rgb(247, 176, 65)">2.1x year </tspan><tspan x="240.49" y="954.8" text-anchor="start" xml:space="preserve" fill="rgb(255, 255, 255)" style="text-decoration:underline;text-decoration-color:rgb(247, 176, 65)">on year</tspan><tspan x="373.14" y="954.8" text-anchor="start" xml:space="preserve">, and slip when either lags.</tspan></text>
