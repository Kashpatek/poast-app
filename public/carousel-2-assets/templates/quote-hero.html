<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body>
<svg viewBox="0 0 1080 1350" width="1080" height="1350" xmlns="http://www.w3.org/2000/svg">

  <rect id="deco-bar" x="76" y="300" width="90" height="10" fill="#F7B041" />

  <!-- eyebrow (annotated) -->
